<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMU - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="Login_page.css">
</head>
<body>
    <div class="container">
        <!-- Left Side - Background Image -->
        <div class="left-side">
            <img src="Web_Images/login_bg.jpeg">
            <div class="left-side-content">
                <h2>Welcome Back,<br>Continue Your Journey</h2>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="right-side">
            <div class="back-link">
                <a href="#">Back to website →</a>
            </div>

            <h1 class="form-title">Login to Your Account</h1>
            <p class="signup-link">Don't have an account? <a href="Sign_up.html">Sign up</a></p>

            <form class="login-form" id="loginForm">
                <input type="email" placeholder="Email" required id="emailInput">

                <div class="password-container">
                    <input type="password" placeholder="Password" required id="passwordInput">
                    <span class="toggle-password" id="togglePassword">
                    </span>
                </div>

                <div class="forgot-password">
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>
        </div>
    </div>

    <script src="Login_page.js"></script>
</body>
</html>
